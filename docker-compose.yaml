services:
  atl-poligon-web:
    build: .
    volumes:
      - ./app:/app
      - ./.env:/app/.env
    env_file:
      - ./.env
    depends_on:
      - db
    expose:
      - 8000
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT}:82"
    volumes:
      - ./nginx_extra.conf:/etc/nginx/conf.d/uploads.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./app/static:/app/static
      - ./app/media:/app/media
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - atl-poligon-web